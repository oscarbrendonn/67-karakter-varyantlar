<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>67 Karakter — Varyantlar (seçim)</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,system-ui,Segoe UI,Roboto,sans-serif;
         background:radial-gradient(1200px 800px at 50% -10%,#1b2030,#0b0d12 70%); color:#e8eaf0; min-height:100vh; }
  header { text-align:center; padding:26px 16px 6px; }
  header h1 { margin:0; font-size:22px; letter-spacing:.3px; }
  header p { margin:8px 0 0; color:#9aa3b5; font-size:14px; line-height:1.5; }
  .grid { max-width:1280px; margin:18px auto; padding:0 16px 40px;
          display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:18px; }
  .card { background:#11151e; border:1px solid #232a38; border-radius:16px; overflow:hidden;
          box-shadow:0 12px 34px rgba(0,0,0,.4); }
  .card h2 { margin:0; padding:12px 14px 4px; font-size:16px; }
  .card .tag { color:#8c97ad; font-size:12px; padding:0 14px 10px; }
  model-viewer { width:100%; height:420px; background:#0e1219; }
  .note { text-align:center; color:#7f8aa0; font-size:13px; margin:8px auto 0; max-width:760px; line-height:1.6; padding:0 16px; }
</style>
</head>
<body>
  <header>
    <h1>67 Karakter — Varyantlar</h1>
    <p>8 üretim. Mouse ile döndür · scroll ile yakınlaş. Arkalar düz siyah (temizlendi).<br>Hepsini incele, en iyisini seç.</p>
  </header>
  <div class="grid" id="grid"></div>
  <p class="note">Tüm modeller anime 4K üretim · DRACO sıkıştırma · arka logosuz.</p>
<script>
  const V = [
    ["ref3-b","dengeli"],
    ["ref3-d","eller iyi"],
    ["ref3-e","yüz + logo iyi"],
    ["ref3-f","temiz"],
    ["ref4-a","yüz + logo iyi"],
    ["ref4-c","alternatif"],
    ["ref3-a","alternatif"],
    ["ref3-c","alternatif"],
  ];
  const g = document.getElementById('grid');
  for (const [name,tag] of V) {
    const c = document.createElement('div'); c.className='card';
    c.innerHTML = `<h2>${name}</h2><div class="tag">${tag}</div>
      <model-viewer src="${name}.glb" alt="67 ${name}" camera-controls touch-action="pan-y"
        auto-rotate auto-rotate-delay="800" rotation-per-second="22deg"
        environment-image="neutral" exposure="1.0" shadow-intensity="0.6"
        camera-orbit="0deg 85deg 2.6m" min-camera-orbit="auto 0deg auto"
        max-camera-orbit="auto 180deg auto" interaction-prompt="none"></model-viewer>`;
    g.appendChild(c);
  }
</script>
</body>
</html>
